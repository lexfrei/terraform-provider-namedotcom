version: "2"
linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    # gomodguard is deprecated since golangci-lint v2.12.0; gomodguard_v2
    # (also enabled via `default: all`) replaces it.
    - gomodguard
    - nonamedreturns
    - wsl
    - wsl_v5
    - whitespace
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        # The terraform-plugin-framework interfaces pass their Request structs
        # by value; the signatures are fixed by the framework contract and
        # cannot be changed to pointers.
        - hugeParam
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 10
    lll:
      # terraform-plugin-framework method signatures (verbose Request/Response
      # type names plus the receiver) routinely run past the default 120.
      line-length: 140
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    varnamelen:
      max-distance: 5
      min-name-length: 3
      check-receiver: false
      check-return: false
      ignore-type-assert-ok: false
      ignore-map-index-ok: false
      ignore-chan-recv-ok: false
      ignore-decls:
        - wg sync.WaitGroup
        - mu sync.Mutex
        - ok bool
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      # Schema attribute keys and fixed test values legitimately repeat
      # across table-driven tests; hoisting each one to a constant only
      # adds indirection without making the tests clearer. The mock-server
      # setup in CRUD tests is also intentionally near-identical per resource.
      - path: _test\.go
        linters:
          - goconst
          - dupl
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
